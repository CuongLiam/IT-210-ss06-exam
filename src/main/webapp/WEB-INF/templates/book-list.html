<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách sách</title>
</head>

<body>

<div th:replace="fragments/header :: header('Danh sách sách')"></div>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Tên</th>
    <th>Tác giả</th>
    <th>Giá</th>
  </tr>

  <tr th:each="b : ${books}"
      th:classappend="${b.price >= 300000} ? 'highlight'">

    <td th:text="${b.id}"></td>
    <td>
      <a th:href="@{/books/{id}(id=${b.id})}"
         th:text="${b.name}"></a>
    </td>
    <td th:text="${b.author}"></td>
    <td th:text="${b.price}"></td>
  </tr>
</table>

<div th:replace="fragments/footer :: footer"></div>

<style>
  .highlight {
    background-color: yellow;
    font-weight: bold;
  }
</style>

</body>
</html>
